<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitBuddy Popup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #000000;
      --bg-card: #000000;
      --border-card: #333333;
      --text-main: #ffffff;
      --text-muted: #888888;
      --primary: #ffffff;
      --primary-hover: #e5e7eb;
      --success: #ffffff;
      --error: #888888;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      width: 320px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: var(--text-main);
      padding: 1.2rem;
      border: 1px solid var(--border-card);
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-card);
      padding-bottom: 0.8rem;
    }

    .logo {
      font-size: 1.15rem;
      font-weight: 700;
      color: #ffffff;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--error);
      border: 1px solid var(--border-card);
    }

    .dot.connected {
      background-color: #ffffff;
    }

    .profile-card {
      background: #000000;
      border: none;
      border-radius: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .profile-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
    }

    .profile-label {
      color: var(--text-muted);
    }

    .profile-val {
      font-weight: 600;
    }

    .badge {
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      background: #000000;
      color: #ffffff;
      border: 1px solid var(--border-card);
    }

    .badge.beginner {
      border-color: var(--border-card);
    }

    .badge.advanced {
      border-color: #ffffff;
    }

    .tech-list {
      font-size: 0.85rem;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
      text-align: right;
    }

    .instruction {
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.4;
      border: 1px dashed var(--border-card);
      border-radius: 0;
      padding: 0.6rem;
      text-align: center;
    }

    button.btn {
      width: 100%;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.75rem;
      border-radius: 8px;
      border: 1px solid #ffffff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      transition: all 0.2s ease;
      background: #ffffff;
      color: #000000;
    }

    button.btn:hover {
      background: var(--primary-hover);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <span class="logo">GitBuddy</span>
      <div class="status-indicator">
        <span class="dot" id="apiDot"></span>
        <span id="apiStatusText">Setup Required</span>
      </div>
    </header>

    <div class="profile-card">
      <div class="profile-item">
        <span class="profile-label">Experience Level</span>
        <span class="profile-val badge" id="skillBadge">Beginner</span>
      </div>
      <div class="profile-item" style="margin-top: 0.25rem;">
        <span class="profile-label">Tech Stack</span>
        <span class="profile-val tech-list" id="techList">None selected</span>
      </div>
    </div>

    <div class="instruction">
      Visit any GitHub repository, and click the compass button on the screen to view your personalized walkthrough.
    </div>

    <button type="button" class="btn" id="btnOptions">
      Open Dashboard
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
